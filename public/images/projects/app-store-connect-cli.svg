<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="112" fill="#0A0A0A"/>

  <!-- Terminal window -->
  <rect x="80" y="120" width="352" height="272" rx="16" fill="#111111" stroke="#1A1A1A" stroke-width="3"/>
  <rect x="80" y="120" width="352" height="36" rx="16" fill="#1A1A1A"/>
  <rect x="80" y="140" width="352" height="16" fill="#1A1A1A"/>

  <!-- Terminal dots -->
  <circle cx="108" cy="138" r="6" fill="#EF4444"/>
  <circle cx="132" cy="138" r="6" fill="#F59E0B"/>
  <circle cx="156" cy="138" r="6" fill="#22C55E"/>

  <!-- CLI prompt lines -->
  <text x="108" y="190" fill="#22C55E" font-family="monospace" font-size="16">$ asc</text>
  <rect x="108" y="210" width="200" height="6" rx="3" fill="#374151"/>
  <rect x="108" y="230" width="160" height="6" rx="3" fill="#374151"/>
  <rect x="108" y="250" width="240" height="6" rx="3" fill="#22C55E" opacity="0.5"/>

  <!-- App Store "A" mark -->
  <circle cx="320" cy="330" r="40" fill="#111111" stroke="#22C55E" stroke-width="4"/>
  <text x="320" y="345" text-anchor="middle" fill="#22C55E" font-family="sans-serif" font-size="36" font-weight="bold">A</text>

  <!-- Connection arrows -->
  <path d="M280 300 L290 310" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/>

  <!-- Go gopher color hint -->
  <circle cx="400" cy="140" r="4" fill="#00ADD8"/>
</svg>
